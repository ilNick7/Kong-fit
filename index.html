<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Kong Fit</title>
  <meta name="description" content="Kong Fit – Personal workout app" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1f3b0a">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">

  <!-- CSS -->
  <link rel="stylesheet" href="css/main.css">
</head>

<body>

<main id="app">

  <!-- =====================================================
       LOGIN / SPLASH
  ====================================================== -->
  <section id="view-login" data-view-section class="splash">
    <div class="splash-content">
      <div class="splash-logo">
        <img src="assets/kong-fit_white.svg" alt="Kong Fit">
      </div>

      <form id="login-form" class="splash-form">
        <input
          id="pin-input"
          type="password"
          inputmode="numeric"
          maxlength="4"
          placeholder="Inserisci codice..."
        />
        <button type="submit" class="splash-enter">Entra</button>
      </form>
    </div>

    <div class="splash-claim">VAI KONG</div>
  </section>

  <!-- =====================================================
       HOME USER
  ====================================================== -->
  <section id="view-home" data-view-section>

    <div class="home-hero">
      <img src="assets/hero.jpg" alt="">
      <button id="profile-btn" class="profile-dot">
        <span id="profile-initials">US</span>
      </button>
    </div>

    <div class="home-content">

      <h2 class="home-greeting">
        Ciao <span id="home-username">—</span>
      </h2>

      <!-- SCHEDA ATTIVA -->
      <p class="home-subtitle">Scheda selezionata</p>

      <div class="home-active-scheda" id="home-active-scheda-card">
        <h3 id="home-scheda-name">—</h3>
        <p class="muted" id="home-scheda-desc">—</p>
        <button id="change-scheda-btn" class="admin-btn">
          Cambia scheda
        </button>
      </div>

      <!-- START / RESUME -->
      <div class="home-start">

        <!-- START NUOVO -->
        <button class="home-start-btn" id="home-start-btn">
          Start nuovo allenamento
        </button>

        <!-- RIPRENDI ALLENAMENTO (nascosto di default) -->
        <button class="home-start-btn hidden" id="home-resume-btn">
          Riprendi allenamento
        </button>

      </div>

      <div class="vai-kong">VAI KONG</div>
    </div>
  </section>

  <!-- =====================================================
       WORKOUT
  ====================================================== -->
  <section id="view-workout" data-view-section>

    <div class="home-content">

      <div class="workout-header">
        <h2 id="workout-title">Allenamento</h2>
        <p class="muted" id="workout-subtitle">—</p>
      </div>

      <form id="workout-form">

        <!-- LISTA ESERCIZI -->
        <div id="workout-exercises"></div>

        <!-- PESO CORPOREO -->
        <div class="workout-bw">
          <label>Peso corporeo (kg)</label>
          <input id="bodyweight" type="number" step="0.1">
        </div>

        <!-- AZIONI -->
        <div class="workout-actions">
          <button type="submit" class="home-start-btn">
            Salva allenamento
          </button>

          <!-- TERMINA ALLENAMENTO -->
          <button type="button" id="end-workout-btn" class="admin-btn danger">
            Termina allenamento
          </button>
        </div>

      </form>
    </div>
  </section>

  <!-- =====================================================
       PROFILO
  ====================================================== -->
  <section id="view-profile" data-view-section>
    <div class="home-content">
      <h2>Profilo</h2>
      <p class="muted">Profilo utente</p>
    </div>
  </section>

</main>

<!-- =====================================================
     MODAL: SELEZIONE SCHEDA (USER)
====================================================== -->
<div id="scheda-select-modal" class="modal hidden">
  <div class="modal-card">
    <div class="modal-head">
      <h3>Scegli la scheda</h3>
      <button id="close-scheda-select">✕</button>
    </div>

    <div id="scheda-select-list">
      <!-- riempito via JS -->
    </div>
  </div>
</div>


<!-- ===============================
     FULLSCREEN REST TIMER
=============================== -->
<div id="rest-timer-overlay" class="hidden">
  <div class="rest-timer-box">
    <div id="rest-timer-value">00:30</div>
    <button id="rest-timer-stop" class="admin-btn danger">
      Interrompi
    </button>
  </div>
</div>


<!-- JS -->
<script src="js/state.js"></script>
<script src="js/templates.js"></script>
<script src="js/auth.js"></script>
<script src="js/profile.js"></script>
<script src="js/home.js"></script>
<script src="js/admin.js"></script>
<script src="js/sheets.js"></script>
<script src="js/workout-ui.js"></script>
<script src="js/workout.js"></script>
<script src="js/app.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }
</script>

</body>
</html>
