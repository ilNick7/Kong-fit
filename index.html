<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Kong Fit</title>
  <meta name="description" content="Kong Fit – personal workout app" />

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/main.css">
</head>

<body>

<main id="app">

  
  <!-- ======================
       SCHERMATA DI APERTURA / LOGIN
  ======================= -->
  <section id="view-login" data-view-section class="splash">

    <div class="splash-content">

      <!-- LOGO -->
      <div class="splash-logo">
        <img src="assets/kong-fit_white.svg" alt="Kong Fit logo">
      </div>

      <!-- INPUT PIN -->
      <form id="login-form" class="splash-form">
        <input
          id="pin-input"
          type="password"
          inputmode="numeric"
          maxlength="4"
          placeholder="Inserisci codice..."
          autocomplete="one-time-code"
        />

        <button type="submit" class="splash-enter">
          Entra
        </button>
      </form>

    </div>

    <!-- CLAIM -->
    <div class="splash-claim">
      Vai Kong
    </div>

  </section>


  <!-- ======================
       PROFILO UTENTE
  ======================= -->
  <section id="view-profile" data-view-section>
    <div class="page">

      <div class="profile-header">
        <h2>Profilo</h2>
        <button id="close-profile" class="icon-btn" aria-label="Chiudi profilo">✕</button>
      </div>

      <div class="item">
        <h3>Account</h3>
        <p><strong>Nome:</strong> <span id="profile-username">—</span></p>
        <p><strong>PIN:</strong> <span id="profile-pin">••••</span></p>
      </div>

      <div class="item">
        <h3>Dati fisici</h3>

        <label for="profile-weight">Peso (kg)</label>
        <input id="profile-weight" type="number" step="0.1" placeholder="es. 78.4">

        <label for="profile-height" style="margin-top:10px;">Altezza (cm)</label>
        <input id="profile-height" type="number" step="1" placeholder="es. 178">

        <button id="save-profile" class="primary" style="margin-top:12px;">Salva</button>
      </div>

      <div class="item">
        <h3>Calendario allenamenti</h3>

        <div class="calendar-header">
          <button id="calendar-prev" class="icon-btn" aria-label="Mese precedente">‹</button>
          <strong id="calendar-month">—</strong>
          <button id="calendar-next" class="icon-btn" aria-label="Mese successivo">›</button>
        </div>

        <div class="calendar-weekdays">
          <span>L</span><span>M</span><span>M</span><span>G</span><span>V</span><span>S</span><span>D</span>
        </div>

        <div class="calendar-grid"></div>

        <div id="calendar-detail">
          <p class="muted">Seleziona un giorno</p>
          <div id="calendar-workouts"></div>
        </div>
      </div>

      <div class="item">
        <button id="switch-account">Cambia account</button>
        <button id="logout-account" class="danger">Logout</button>
      </div>

    </div>
  </section>

  <!-- ======================
       HOME / ALLENAMENTO (ONE PAGE STYLE)
  ======================= -->
  <section id="view-home" data-view-section>

    <!-- HERO (immagine) -->
    <div class="home-hero">
      <img class="home-hero-img" src="assets/hero.jpg" alt="Hero Kong Fit">
    
      <button id="profile-btn" class="profile-dot" aria-label="Profilo">
        <span id="profile-initials">US</span>
      </button>
    </div>


    <!-- Contenuto bianco sopra la hero -->
    <div class="home-content">

      <h2 class="home-greeting">
        Ciao <span id="home-username">—</span>
      </h2>
      <p class="home-subtitle">Allenamenti in evidenza</p>

      <!-- SCROLL ORIZZONTALE (dinamico) -->
      <div class="home-cards-scroll" id="recent-schede" aria-label="Schede recenti">
        <!-- riempito via JS -->
      </div>

      <!-- Start -->
      <div class="home-start">
        <div class="home-start-info">
          <strong>Inizia allenamento</strong>
          <small id="home-date">—</small>

          <!-- badge scheda/giorno attivo -->
          <span class="home-badge" id="home-active-scheda">—</span>
        </div>

        <button class="home-start-btn" id="home-start-btn">Start</button>
      </div>

      <!-- Obiettivi CTA (porta alla sezione obiettivi) -->
      <div class="home-goals" id="home-goals">
        <strong>Visualizza obiettivi</strong>
        <p class="muted" style="margin-top:6px;">Testo motivazionale</p>
        <button class="home-goals-btn" id="home-goals-btn">Dacci dentro</button>
      </div>

      <!-- Ancora obiettivi (one-page feel) -->
      <div id="section-obiettivi" class="home-anchor">
        <h3>Obiettivi</h3>
        <p class="muted">Qui inserirò obiettivi, progressi e motivazione.</p>
      </div>

      <!-- Ancora schede (one-page feel) -->
      <div id="section-schede" class="home-anchor">
        <h3>Schede</h3>
        <div id="scheda-container"></div>
      </div>

      <!-- Footer claim -->
      <div class="vai-kong">
        VAI KONG
      </div>

    </div>
  </section>

</main>

<!-- Bottom nav (inizialmente nascosta, appare solo scrollando) -->
<footer id="app-footer" class="footer-nav">
  <nav class="bottom-nav" aria-label="Navigazione">
    <button type="button" data-nav="schede">Schede</button>
    <button type="button" data-nav="obiettivi">Obiettivi</button>
  </nav>
</footer>

<!-- JS -->
<script src="js/state.js"></script>
<script src="js/templates.js"></script>
<script src="js/auth.js"></script>
<script src="js/workout.js"></script>
<script src="js/profile.js"></script>
<script src="js/home.js"></script>
<script src="js/app.js"></script>

</body>
</html>
