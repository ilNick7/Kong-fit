<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Kong Fit</title>
  <meta name="description" content="Kong Fit – Personal workout app" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1f3b0a">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">

  <!-- CSS -->
  <link rel="stylesheet" href="css/main.css">
</head>

<body>

<main id="app">

  <!-- =====================================================
       LOGIN / SPLASH
  ====================================================== -->
  <section id="view-login" data-view-section class="splash">
    <div class="splash-content">
      <div class="splash-logo">
        <img src="assets/kong-fit_white.svg" alt="Kong Fit">
      </div>

      <form id="login-form" class="splash-form">
        <input
          id="pin-input"
          type="password"
          inputmode="numeric"
          maxlength="4"
          placeholder="Inserisci codice..."
        />
        <button type="submit" class="splash-enter">Entra</button>
      </form>
    </div>

    <div class="splash-claim">VAI KONG</div>
  </section>


  <!-- =====================================================
       HOME USER
  ====================================================== -->
  <section id="view-home" data-view-section>

    <div class="home-hero">
      <img src="assets/hero.jpg" alt="Hero">

      <button id="profile-btn" class="profile-dot">
        <span id="profile-initials">US</span>
      </button>
    </div>

    <div class="home-content">

      <h2 class="home-greeting">
        Ciao <span id="home-username">—</span>
      </h2>

      <!-- ✅ NEW: SCHEDA ATTIVA -->
      <p class="home-subtitle">Scheda attiva</p>

      <div class="home-active-scheda" id="home-active-scheda-card">
        <h3 id="home-scheda-name">—</h3>
        <p class="muted" id="home-scheda-desc">—</p>
      </div>
      <!-- ✅ END NEW -->

      <!-- START -->
      <div class="home-start">
        <div class="home-start-info">
          <strong>Inizia allenamento</strong>
          <small id="home-date">—</small>
        </div>

        <button class="home-start-btn" id="home-start-btn">
          Start
        </button>
      </div>

      <!-- OBIETTIVI -->
      <div class="home-goals">
        <strong>Visualizza obiettivi</strong>
        <p class="muted">Rimani costante, un set alla volta.</p>
        <button class="home-goals-btn" id="home-goals-btn">
          Dacci dentro
        </button>
      </div>

      <div class="vai-kong">VAI KONG</div>
    </div>
  </section>


  <!-- =====================================================
       ADMIN
  ====================================================== -->
  <section id="view-admin" data-view-section>

    <div class="home-hero admin-hero">
      <img src="assets/hero.jpg" alt="Hero admin">

      <button id="admin-profile-btn" class="profile-dot">
        <span id="admin-profile-initials">US</span>
      </button>
    </div>

    <div class="home-content admin-content" id="admin-root" data-mode="clean">

      <h2 class="home-greeting">Ciao Admin</h2>
      <p class="home-subtitle">Ultime schede modificate</p>

      <div class="admin-recent" id="admin-recent-schede"></div>

      <div class="admin-actions">
        <div class="admin-action">
          <h3>Crea nuova scheda</h3>
          <button class="admin-btn" id="admin-go-create">Crea</button>
        </div>

        <div class="admin-action">
          <h3>Modifica scheda</h3>
          <button class="admin-btn" id="admin-go-edit">Modifica</button>
        </div>
      </div>

      <!-- CREA -->
      <div class="admin-section" id="admin-create-section">
        <h3>Crea scheda</h3>
        <button type="button" class="admin-back" id="admin-back-from-create">
          ← Indietro
        </button>

        <form id="create-scheda-form" class="admin-form">
          <label>Nome scheda</label>
          <input id="scheda-name" type="text" required>

          <label>Gruppi muscolari</label>
          <input id="scheda-desc" type="text">

          <div class="admin-form-divider"></div>

          <h4>Esercizi</h4>
          <div id="exercise-list"></div>

          <button type="button" id="add-exercise" class="admin-add">
            + Aggiungi esercizio
          </button>

          <button type="submit" class="admin-submit">
            Crea la scheda
          </button>
        </form>
      </div>

      <!-- MODIFICA -->
      <div class="admin-section" id="admin-edit-section">
        <h3>Modifica scheda</h3>
        <button type="button" class="admin-back" id="admin-back-from-edit">
          ← Indietro
        </button>

        <div class="admin-form">
          <label>Seleziona scheda</label>
          <select id="edit-select"></select>

          <div class="admin-edit-actions">
            <button type="button" id="load-scheda" class="admin-btn">
              Carica
            </button>
            <button type="button" id="delete-scheda" class="admin-btn danger">
              Elimina
            </button>
          </div>
        </div>
      </div>

    </div>
  </section>


  <!-- =====================================================
       WORKOUT
  ====================================================== -->
  <section id="view-workout" data-view-section>
    <div class="home-content">

      <div class="workout-header">
        <h2 id="workout-title">Allenamento</h2>
        <p class="muted" id="workout-subtitle">—</p>
      </div>

      <form id="workout-form">
        <div id="workout-exercises"></div>

        <div class="workout-bw">
          <label>Peso corporeo (kg)</label>
          <input id="bodyweight" type="number" step="0.1">
        </div>

        <button type="submit" class="home-start-btn">
          Salva allenamento
        </button>
      </form>
    </div>
  </section>


  <!-- =====================================================
       PROFILO
  ====================================================== -->
  <section id="view-profile" data-view-section>
    <div class="home-content">
      <h2>Profilo</h2>
      <p class="muted">Profilo utente</p>
    </div>
  </section>

</main>

<!-- =====================================================
     MODAL DETTAGLIO SCHEDA (ADMIN)
====================================================== -->
<div id="scheda-modal" class="modal hidden">
  <div class="modal-card">

    <div class="modal-head">
      <h3 id="modal-title">Scheda</h3>
      <button type="button" id="modal-close">✕</button>
    </div>

    <p class="muted" id="modal-desc"></p>
    <div id="modal-exercises"></div>

    <div class="modal-actions">
      <!-- ✅ NEW -->
      <button type="button" id="modal-set-active" class="admin-submit">
        Imposta come scheda attiva
      </button>

      <button type="button" id="modal-edit" class="admin-btn">
        Modifica
      </button>
      <button type="button" id="modal-ok" class="admin-submit">
        Chiudi
      </button>
    </div>
  </div>
</div>


<!-- JS -->
<script src="js/state.js"></script>
<script src="js/templates.js"></script>
<script src="js/auth.js"></script>
<script src="js/profile.js"></script>
<script src="js/home.js"></script>
<script src="js/admin.js"></script>
<script src="js/workout-ui.js"></script>
<script src="js/workout.js"></script>
<script src="js/app.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }
</script>

</body>
</html>
