<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kong Fit</title>

  <meta name="theme-color" content="#0e0f14">

  <!-- CSS -->
  <link rel="stylesheet" href="css/main.css">
</head>

<body>

<main id="app">

  <!-- ===============================
       LOGIN
  =============================== -->
  <section id="view-login" data-view-section class="splash">
    <div class="splash-content">
      <h1>Kong Fit</h1>

      <form id="login-form">
        <input
          id="pin-input"
          type="password"
          inputmode="numeric"
          maxlength="4"
          placeholder="PIN"
        />
        <button type="submit">Entra</button>
      </form>
    </div>
  </section>

  <!-- ===============================
       HOME
  =============================== -->
  <section id="view-home" data-view-section>

    <div class="home-hero">
      <button id="profile-btn" class="profile-dot">
        <span id="profile-initials">US</span>
      </button>
    </div>

    <div class="home-content">

      <h2 class="home-greeting">
        Ciao <span id="home-username">—</span>
      </h2>

      <div class="home-active-scheda">
        <h3 id="home-scheda-name">—</h3>
        <p id="home-scheda-desc">Scheda di allenamento</p>

        <button id="change-scheda-btn" class="admin-btn">
          Cambia scheda
        </button>
      </div>

      <div class="home-start">
        <button id="home-start-btn" class="home-start-btn">
          Start allenamento
        </button>

        <button id="home-resume-btn" class="home-start-btn hidden">
          Riprendi allenamento
        </button>
      </div>

    </div>
  </section>

  <!-- ===============================
       WORKOUT
  =============================== -->
  <section id="view-workout" data-view-section>

    <div class="home-content">

      <div class="workout-header">
        <h2 id="workout-title">—</h2>
        <p id="workout-subtitle">Allenamento</p>
      </div>

      <form id="workout-form">

        <div id="workout-exercises"></div>

        <div class="workout-actions">
          <button type="submit" class="home-start-btn">
            Salva allenamento
          </button>

          <button type="button" id="end-workout-btn" class="admin-btn danger">
            Termina allenamento
          </button>

          <button type="button" id="delete-workout-btn" class="admin-btn">
            Elimina allenamento
          </button>
        </div>

      </form>
    </div>
  </section>

  <!-- ===============================
       PROFILO
  =============================== -->
  <section id="view-profile" data-view-section>
    <div class="home-content">
      <h2>Profilo</h2>
      <button id="logout-btn" class="admin-btn danger">
        Logout
      </button>
    </div>
  </section>

</main>

<!-- ===============================
     MODAL SELEZIONE SCHEDA
=============================== -->
<div id="scheda-select-modal" class="modal hidden">
  <div class="modal-card">
    <h3>Scegli la scheda</h3>
    <div id="scheda-select-list"></div>
    <button id="close-scheda-select" class="admin-btn">Chiudi</button>
  </div>
</div>

<!-- ===============================
     TIMER FULLSCREEN
=============================== -->
<div id="rest-timer-overlay" class="hidden">
  <div class="rest-timer-box">
    <div id="rest-timer-value">00:30</div>
    <button id="rest-timer-stop" class="admin-btn danger">
      Interrompi
    </button>
  </div>
</div>

<!-- ===============================
     JS
=============================== -->
<script src="js/state.js"></script>
<script src="js/auth.js"></script>
<script src="js/sheets.js"></script>
<script src="js/home.js"></script>
<script src="js/workout-ui.js"></script>
<script src="js/workout.js"></script>
<script src="js/profile.js"></script>
<script src="js/app.js"></script>

</body>
</html>
