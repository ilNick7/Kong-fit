<!-- ======================
     PROFILO UTENTE
======================= -->
<section id="view-profile" data-view-section>

  <!-- Header profilo -->
  <div class="profile-header">
    <h2>Profilo</h2>

    <!-- Chiudi profilo -->
    <button id="close-profile" aria-label="Chiudi profilo">
      ✕
    </button>
  </div>

  <!-- ======================
       ACCOUNT
  ======================= -->
  <div class="item">
    <h3>Account</h3>

    <p>
      <strong>Nome utente:</strong>
      <span id="profile-username">—</span>
    </p>

    <p>
      <strong>Codice personale (PIN):</strong>
      <span id="profile-pin">••••</span>
    </p>
  </div>

  <!-- ======================
       DATI FISICI
  ======================= -->
  <div class="item">
    <h3>Dati fisici</h3>

    <label for="profile-weight">Peso (kg)</label>
    <input
      id="profile-weight"
      type="number"
      step="0.1"
      placeholder="es. 78.4"
    />

    <label for="profile-height">Altezza (cm)</label>
    <input
      id="profile-height"
      type="number"
      step="1"
      placeholder="es. 178"
    />

    <button id="save-profile" class="primary">
      Salva dati
    </button>
  </div>

  <!-- ======================
       CALENDARIO
  ======================= -->
  <div class="item">
    <h3>Calendario allenamenti</h3>

    <!-- Intestazione mese -->
    <div class="calendar-header">
      <button id="calendar-prev" aria-label="Mese precedente">‹</button>
      <strong id="calendar-month">Aprile 2026</strong>
      <button id="calendar-next" aria-label="Mese successivo">›</button>
    </div>

    <!-- Giorni settimana -->
    <div class="calendar-weekdays">
      <span>L</span>
      <span>M</span>
      <span>M</span>
      <span>G</span>
      <span>V</span>
      <span>S</span>
      <span>D</span>
    </div>

    <!-- Griglia giorni -->
    <div class="calendar-grid">
      <!--
        Ogni giorno è un button:
        - data-day="YYYY-MM-DD"
        - JS: click → mostra allenamenti del giorno
      -->

      <button class="calendar-day" data-day="2026-04-01">1</button>
      <button class="calendar-day" data-day="2026-04-02">2</button>
      <button class="calendar-day" data-day="2026-04-03">3</button>
      <button class="calendar-day" data-day="2026-04-04">4</button>
      <button class="calendar-day" data-day="2026-04-05">5</button>
      <button class="calendar-day" data-day="2026-04-06">6</button>
      <button class="calendar-day" data-day="2026-04-07">7</button>
      <!-- … il resto del mese sarà generato via JS -->
    </div>

    <!-- Dettaglio giorno selezionato -->
    <div id="calendar-detail">
      <p class="muted">
        Seleziona un giorno per vedere gli allenamenti svolti.
      </p>

      <!-- Qui JS inserirà lo storico di quel giorno -->
      <div id="calendar-workouts">
        <!-- workout del giorno -->
      </div>
    </div>
  </div>

  <!-- ======================
       AZIONI ACCOUNT
  ======================= -->
  <div class="item">
    <h3>Sessione</h3>

    <button id="switch-account">
      Cambia account (PIN)
    </button>

    <button id="logout-account" class="danger">
      Logout
    </button>
  </div>

</section>
